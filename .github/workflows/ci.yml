name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache NX
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: nx-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      # CRITICAL — must be before typecheck and build
      - name: Generate Prisma Client
        working-directory: apps/api
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          DIRECT_URL: "postgresql://fake:fake@localhost:5432/fake"
        run: npx prisma generate

      - name: Verify NX graph
        run: npx nx show projects --verbose

      - name: Lint
        run: npx nx run-many -t lint --exclude='*-e2e' --parallel=5 --verbose

      - name: Typecheck
        run: npx nx run-many -t typecheck --exclude='*-e2e' --parallel=3 --verbose

      - name: Test
        run: npx nx run-many -t test --exclude='*-e2e' --parallel=3 --verbose

      - name: Build
        run: npx nx run-many -t build --exclude='*-e2e' --parallel=3 --verbose
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
