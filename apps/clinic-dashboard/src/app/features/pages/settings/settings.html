<section class="card border-0 shadow-sm">
  <div class="card-body p-3 p-md-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
      <div>
        <p class="text-secondary text-uppercase small mb-2">Settings</p>
        <h2 class="h4 mb-1">Clinic dashboard settings</h2>
        <p class="text-secondary mb-0">Manage your clinic master data and appointment records.</p>
      </div>
    </div>

    <div class="border rounded-3 overflow-hidden">
      <div class="d-none d-md-block bg-light border-bottom px-3 py-3">
        <div class="row align-items-center fw-semibold text-secondary text-uppercase small g-3">
          <div class="col-md-4">Module name</div>
          <div class="col-md-4 text-md-center">Add new</div>
          <div class="col-md-4 text-md-end">Update/Delete</div>
        </div>
      </div>

      <div class="px-3 py-3 border-bottom">
        <div class="row g-3 align-items-md-center">
          <div class="col-12 col-md-4">
            <div class="fw-semibold text-dark">Clinics</div>
            <div class="text-secondary small">Maintain clinic master records.</div>
          </div>
          <div class="col-12 col-md-4 text-md-center">
            <button type="button" class="btn btn-primary settings-action-btn" (click)="addClinic()">
              Add New
            </button>
          </div>
          <div class="col-12 col-md-4 text-md-end">
            <button type="button" class="btn btn-outline-primary settings-action-btn" (click)="manageClinic()">
              {{ clinicCount() }} records Update/Delete
            </button>
          </div>
        </div>
      </div>

      <div class="px-3 py-3">
        <div class="row g-3 align-items-md-center">
          <div class="col-12 col-md-4">
            <div class="fw-semibold text-dark">Appointments</div>
            <div class="text-secondary small">Create or manage appointment records.</div>
          </div>
          <div class="col-12 col-md-4 text-md-center">
            <button type="button" class="btn btn-primary settings-action-btn" (click)="addAppointment()">
              Add New
            </button>
          </div>
          <div class="col-12 col-md-4 text-md-end">
            <button type="button" class="btn btn-outline-primary settings-action-btn" (click)="manageAppointments()">
              {{ appointmentCount() }} records Update/Delete
            </button>
          </div>
        </div>
      </div>
      <div>
         <div class="row g-3 align-items-md-center">
          <div class="col-12 col-md-4">
            <div class="fw-semibold text-dark">Working Hours</div>
            <div class="text-secondary small">Manage clinic working hours.</div>
          </div>
          <div class="col-12 col-md-4 text-md-center">
            <button type="button" class="btn btn-primary settings-action-btn" (click)="addWorkingHours()">
              Add New
            </button>
          </div>
          <div class="col-12 col-md-4 text-md-end">
            <button type="button" class="btn btn-outline-primary settings-action-btn" (click)="manageWorkingHours()">
              {{ workingHoursCount() }} records Update/Delete
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
